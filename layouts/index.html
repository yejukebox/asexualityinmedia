<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>{{ .Site.Title }}</h1>
            <p class="tagline">{{ .Site.Params.description }}</p>
            <nav>
                <a href="{{ .Site.BaseURL }}">Home</a>
                <a href="{{ "about" | relURL }}">About</a>
                <a href="{{ "submit" | relURL }}">Submit Character</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="filters">
            <h2>Explore Characters</h2>
            <div class="filter-controls">
                <div class="filter-group">
                    <label for="genre-filter">Genre</label>
                    <select id="genre-filter">
                        <option value="all">All Genres</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="language-filter">Language</label>
                    <select id="language-filter">
                        <option value="all">All Languages</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="type-filter">Representation</label>
                    <select id="type-filter">
                        <option value="all">All Types</option>
                        <option value="explicit">Explicit</option>
                        <option value="implicit">Implicit</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="media-filter">Media</label>
                    <select id="media-filter">
                        <option value="all">TV &amp; Film</option>
                        <option value="TV">TV Only</option>
                        <option value="Film">Film Only</option>
                    </select>
                </div>
                <div class="filter-group filter-search">
                    <label for="search">Search</label>
                    <input type="text" id="search" placeholder="Character or show…">
                </div>
            </div>
        </section>

        <section class="visualization">
            <div class="chart-legend">
                <div class="legend-group">
                    <span class="legend-dot explicit-dot"></span><span>Explicit</span>
                    <span class="legend-dot implicit-dot"></span><span>Implicit</span>
                </div>
                <div class="legend-group">
                    <span class="legend-circle"></span><span>TV series</span>
                    <span class="legend-diamond"></span><span>Film</span>
                </div>
                <div class="legend-group">
                    <span class="legend-dot speculated-dot"></span><span>Speculated canon</span>
                </div>
            </div>
            <div id="chart"></div>
        </section>

        <section class="character-count">
            <p>Showing <strong id="visible-count">0</strong> of <strong id="total-count">0</strong> characters</p>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Asexuality in Media &mdash; <a href="https://github.com/yejukebox/asexualityinmedia" target="_blank">View on GitHub</a></p>
        </div>
    </footer>

    <script src="{{ "js/visualization.js" | relURL }}"></script>
</body>
</html>
